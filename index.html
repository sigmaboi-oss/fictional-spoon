<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>

/* 🔥 RESET */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: #0f0000; /* PERFECT MATCH */
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff;
}

/* 🔥 MAIN WRAP */
#wrap {
  padding: 16px;
  min-height: 420px; /* 🔥 fills iframe nicely */
}

/* 👥 COUNT */
#top {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 10px;
}

#count {
  font-size: 32px;
  font-weight: 900;
  color: #ffae00;
  text-shadow:
    0 0 8px #ff3c00,
    0 0 18px #ff3c00;
}

#mlabel {
  font-size: 13px;
  color: #ffae00;
}

/* 📊 BAR */
#barbg {
  background: #000;
  height: 22px;
  margin: 10px 0;
  border: 1px solid #ff3c00;
}

#bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#ffae00,#ff3c00);
  box-shadow: 0 0 12px #ff3c00;
  transition: width 0.8s ease;
}

/* RANGE */
#labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #ffae00;
  margin-bottom: 12px;
}

/* 🎯 GOALS */
#goals {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.goal {
  font-size: 12px;
  padding: 8px;
  background: #000;
  border: 1px solid #ff3c00;
  color: #ffae00;
  text-align: left;
}

</style>
</head>

<body>

<div id="wrap">

  <!-- 👥 COUNT -->
  <div id="top">
    <span id="count">…</span>
    <span id="mlabel">Members</span>
  </div>

  <!-- 📊 BAR -->
  <div id="barbg">
    <div id="bar"></div>
  </div>

  <!-- RANGE -->
  <div id="labels">
    <span id="low">—</span>
    <span id="high">—</span>
  </div>

  <!-- 🎯 GOALS -->
  <div id="goals"></div>

</div>

<script>

const milestones = [50,100,200,300,400,500,750,1000];
const goalsList = [100,200,300,400,500];

async function load(){
  try{
    const res = await fetch("https://api.chess.com/pub/club/group-a162138be57d83c3500191b84a4b325d/members");
    const data = await res.json();

    const all = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const unique = {};
    all.forEach(m => unique[m.username] = true);

    const n = Object.keys(unique).length;

    let low = 0, high = milestones[milestones.length - 1];

    for(let i=0;i<milestones.length;i++){
      if(milestones[i] < n) low = milestones[i];
      if(milestones[i] >= n){
        high = milestones[i];
        break;
      }
    }

    if(n === high){
      let i = milestones.indexOf(high);
      if(i + 1 < milestones.length){
        low = high;
        high = milestones[i + 1];
      }
    }

    const pct = high > low ? ((n - low)/(high - low))*100 : 100;

    document.getElementById('count').textContent = n;
    document.getElementById('low').textContent = low;
    document.getElementById('high').textContent = high;
    document.getElementById('bar').style.width = pct + '%';

    document.getElementById("goals").innerHTML =
      goalsList.map(g=>{
        let diff = g - n;
        return `<div class="goal">🔥 ${g} (${diff > 0 ? diff + " members left" : "completed"})</div>`;
      }).join("");

  } catch(e){
    document.getElementById('count').textContent = '—';
    console.error(e);
  }
}

load();
setInterval(load, 300000);

</script>

</body>
</html>
