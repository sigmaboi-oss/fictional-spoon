<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff;
}

/* 🔥 WRAP (TALLER + DEEPER COLOR) */
#wrap {
  padding: 16px;
  min-height: 380px; /* 🔥 makes it longer */

  background:
    radial-gradient(circle at top left, rgba(255,60,0,0.45), transparent 70%),
    radial-gradient(circle at bottom right, rgba(255,120,0,0.35), transparent 70%),
    rgba(10,0,0,0.97);

  box-shadow:
    inset 0 0 30px rgba(255,80,0,0.4),
    0 0 20px rgba(255,60,0,0.3);
}

/* 👥 COUNT */
#count {
  font-size: 30px;
  font-weight: 900;
  color: #ffae00;
  text-shadow:
    0 0 10px #ff3c00,
    0 0 25px #ff3c00,
    0 0 50px #ff6a00;
}

#mlabel {
  font-size: 13px;
  color: #ffae00;
  margin-left: 6px;
}

/* 📊 BAR */
#barbg {
  background: rgba(0,0,0,0.7);
  height: 22px; /* 🔥 thicker bar */
  margin: 12px 0;
  border: 1px solid rgba(255,80,0,0.4);
}

#bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#ffae00,#ff6a00,#ff3c00);
  box-shadow:
    0 0 10px #ff3c00,
    0 0 25px #ff6a00;
  transition: width 0.8s ease;
}

/* RANGE */
#labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #ffae00;
}

/* 🎯 GOALS */
#goals {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.goal {
  font-size: 12px;
  padding: 8px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,60,0,0.5);
  color: #ffae00;

  box-shadow:
    0 0 10px rgba(255,60,0,0.4),
    inset 0 0 10px rgba(255,120,0,0.2);
}

</style>
</head>

<body>

<div id="wrap">

  <!-- 👥 COUNT -->
  <div>
    <span id="count">…</span>
    <span id="mlabel">Members</span>
  </div>

  <!-- 📊 BAR -->
  <div id="barbg">
    <div id="bar"></div>
  </div>

  <!-- RANGE -->
  <div id="labels">
    <span id="low">—</span>
    <span id="high">—</span>
  </div>

  <!-- 🎯 GOALS -->
  <div id="goals"></div>

</div>

<script>

const milestones = [50,100,200,300,400,500,750,1000];
const goalsList = [100,200,300,400,500];

async function load(){
  try{
    const res = await fetch("https://api.chess.com/pub/club/group-a162138be57d83c3500191b84a4b325d/members");
    const data = await res.json();

    const all = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const unique = {};
    all.forEach(m => unique[m.username] = true);

    const n = Object.keys(unique).length;

    let low = 0, high = milestones[milestones.length - 1];

    for(let i=0;i<milestones.length;i++){
      if(milestones[i] < n) low = milestones[i];
      if(milestones[i] >= n){
        high = milestones[i];
        break;
      }
    }

    if(n === high){
      let i = milestones.indexOf(high);
      if(i + 1 < milestones.length){
        low = high;
        high = milestones[i + 1];
      }
    }

    const pct = high > low ? ((n - low)/(high - low))*100 : 100;

    document.getElementById('count').textContent = n;
    document.getElementById('low').textContent = low;
    document.getElementById('high').textContent = high;
    document.getElementById('bar').style.width = pct + '%';

    document.getElementById("goals").innerHTML =
      goalsList.map(g=>{
        let diff = g - n;
        return `<div class="goal">🔥 ${g} (${diff > 0 ? diff + " members left" : "completed"})</div>`;
      }).join("");

  } catch(e){
    document.getElementById('count').textContent = '—';
    console.error(e);
  }
}

load();
setInterval(load, 300000);

</script>

</body>
</html>
